services:
    tekkom_bot:
        container_name: tekkom_bot
        image: tekkom_bot
        restart: always
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        depends_on:
            tekkom_bot_api:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "pgrep -x bun || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        mem_limit: 1g
        cpus: "1.0"

    tekkom_bot_api:
        container_name: tekkom_bot_api
        image: tekkom_bot_api
        restart: always
        build:
            context: ./api
            dockerfile: Dockerfile
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "8080:8080"
        env_file:
            - .env
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
            interval: 30s
            timeout: 5s
            start_period: 10s
            retries: 3
        mem_limit: 1g
        cpus: "1.0"

    postgres:
        image: postgres:18-alpine
        container_name: tekkom_bot_database
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER:-tekkom_bot}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB:-tekkom_bot}
            TZ: Europe/Oslo
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tekkom_bot} -d ${DB:-tekkom_bot}"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s
        mem_limit: 1g
        cpus: "2.0"
        shm_size: 1gb

volumes:
    postgres_data:
